<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaiGo — 無料で始める</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #10B981;
    --green-dark: #059669;
    --green-light: #D1FAE5;
    --green-pale: #F0FDF4;
    --text: #0F172A;
    --text-sub: #475569;
    --text-light: #94A3B8;
    --border: #E2E8F0;
    --red: #EF4444;
    --white: #FFFFFF;
    --bg: #F8FAFB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 5vw, 48px);
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    color: var(--green-dark);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; }
  .header-link { font-size: 13px; color: var(--text-sub); text-decoration: none; }
  .header-link:hover { color: var(--text); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: clamp(28px, 5vw, 48px);
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(15,23,42,0.07);
  }

  .trial-badge {
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 100px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: clamp(22px, 4vw, 28px);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* 特典リスト */
  .benefits {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    background: var(--green-pale);
    border: 1px solid var(--green-light);
    border-radius: 12px;
    padding: 16px;
  }
  .benefit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .benefit-check {
    color: var(--green);
    font-weight: 700;
    flex-shrink: 0;
  }

  .form { display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--green); }

  .btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: white;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(16,185,129,0.3);
    margin-top: 4px;
  }
  .btn-submit:hover:not(:disabled) {
    background: var(--green-dark);
    transform: translateY(-1px);
  }
  .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

  .form-note {
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
    line-height: 1.6;
    margin-top: 4px;
  }

  .alert-error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #DC2626;
    display: none;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 16px;
  }
  .alert-error.show { display: flex; }

  /* 完了画面 */
  .success-view { display: none; text-align: center; padding: 20px 0; }
  .success-view.show { display: block; }
  .success-icon {
    width: 72px; height: 72px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }
  .success-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
  .success-desc { font-size: 14px; color: var(--text-sub); line-height: 1.7; margin-bottom: 28px; }
  .btn-go {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: white;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    transition: background 0.2s;
    box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  }
  .btn-go:hover { background: var(--green-dark); }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a href="https://kai-go-lp.vercel.app" class="logo">KaiGo<span class="logo-dot"></span></a>
  <a href="https://kaigolearning-app.vercel.app" class="header-link">ログインはこちら →</a>
</header>

<main>
  <div class="card">

    <!-- 登録フォーム -->
    <div id="signup-form">
      <div class="trial-badge">🎉 1ヶ月無料トライアル</div>
      <h1 class="card-title">無料で始めましょう</h1>
      <p class="card-sub">クレジットカード不要。30日間すべての機能を無料でお使いいただけます。</p>

      <div class="benefits">
        <div class="benefit-item"><span class="benefit-check">✓</span>400問以上の介護特化コンテンツ</div>
        <div class="benefit-item"><span class="benefit-check">✓</span>AI問題生成・多言語対応・進捗管理</div>
        <div class="benefit-item"><span class="benefit-check">✓</span>30日間無料・クレジットカード不要</div>
        <div class="benefit-item"><span class="benefit-check">✓</span>トライアル終了後は月額¥8,000</div>
      </div>

      <div class="alert-error" id="error-msg">
        <span>⚠️</span>
        <span id="error-text">エラーが発生しました</span>
      </div>

      <div class="form">
        <div class="field">
          <label for="facilityName">施設名 <span style="color:var(--red)">*</span></label>
          <input type="text" id="facilityName" placeholder="例：介護施設さくら" autocomplete="organization">
        </div>
        <div class="field">
          <label for="adminName">担当者名 <span style="color:var(--red)">*</span></label>
          <input type="text" id="adminName" placeholder="例：山田 太郎" autocomplete="name">
        </div>
        <div class="field">
          <label for="email">メールアドレス <span style="color:var(--red)">*</span></label>
          <input type="email" id="email" placeholder="例：yamada@facility.jp" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">パスワード <span style="color:var(--red)">*</span></label>
          <input type="password" id="password" placeholder="8文字以上" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="btn-submit" onclick="submitSignup()">
          30日間無料で始める →
        </button>
        <p class="form-note">
          登録することで<a href="#" style="color:var(--text-sub)">利用規約</a>・<a href="#" style="color:var(--text-sub)">プライバシーポリシー</a>に同意したものとみなされます
        </p>
      </div>
    </div>

    <!-- 完了画面 -->
    <div id="success-view" class="success-view">
      <div class="success-icon">🎉</div>
      <h2 class="success-title">登録完了！</h2>
      <p class="success-desc">
        <strong id="success-facility"></strong>の登録が完了しました。<br>
        30日間の無料トライアルが始まります。<br>
        まずはスタッフを追加してみましょう。
      </p>
      <a href="https://kaigolearning-app.vercel.app" class="btn-go">
        アプリを開く →
      </a>
    </div>

  </div>
</main>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyBEGTllKWCiVqNt1HUR7mWcSnQRzWUpaFI",
    authDomain:        "carego-app-893be.firebaseapp.com",
    projectId:         "carego-app-893be",
    storageBucket:     "carego-app-893be.firebasestorage.app",
    messagingSenderId: "34055976814",
    appId:             "1:34055976814:web:0364b2777a8c6c223a337f",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  window._firebase = { auth, db, createUserWithEmailAndPassword, doc, setDoc, serverTimestamp };
</script>

<script>
  const API_BASE = 'https://kaigolearning-app.vercel.app';

  window.submitSignup = async function() {
    const facilityName = document.getElementById('facilityName').value.trim();
    const adminName    = document.getElementById('adminName').value.trim();
    const email        = document.getElementById('email').value.trim();
    const password     = document.getElementById('password').value;

    // バリデーション
    const err = !facilityName ? '施設名を入力してください'
              : !adminName    ? '担当者名を入力してください'
              : !email        ? 'メールアドレスを入力してください'
              : !email.includes('@') ? '正しいメールアドレスを入力してください'
              : !password     ? 'パスワードを入力してください'
              : password.length < 8 ? 'パスワードは8文字以上にしてください'
              : null;

    if (err) { showError(err); return; }
    hideError();

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 登録中...';

    try {
      const { auth, db, createUserWithEmailAndPassword, doc, setDoc, serverTimestamp } = window._firebase;

      // 1. Firebase Auth でアカウント作成
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = cred.user.uid;
      const facilityId = `facility_${Date.now()}`;
      const trialEnd = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);

      // 2. Firestoreに施設・管理者情報を書き込み
      await setDoc(doc(db, 'admins', uid), {
        facilityId,
        facilityName,
        name:               adminName,
        email,
        adminRole:          'owner',
        maxUsers:           9999,
        plan:               'standard',
        subscriptionStatus: 'trialing',
        trialEnd,
        needsOnboarding:    true,
        createdAt:          serverTimestamp(),
      });

      // 3. 完了画面へ
      document.getElementById('success-facility').textContent = facilityName;
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('success-view').classList.add('show');

      // 4秒後にアプリへ自動リダイレクト
      setTimeout(() => {
        window.location.href = 'https://kaigolearning-app.vercel.app';
      }, 4000);

    } catch (err) {
      let msg = err.message;
      if (err.code === 'auth/email-already-in-use') msg = 'このメールアドレスはすでに登録されています。';
      if (err.code === 'auth/weak-password') msg = 'パスワードは8文字以上にしてください。';
      showError(msg);
      btn.disabled = false;
      btn.innerHTML = '30日間無料で始める →';
    }
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.classList.add('show');
    document.getElementById('error-text').textContent = msg;
  }
  function hideError() {
    document.getElementById('error-msg').classList.remove('show');
  }
</script>

</body>
</html>
